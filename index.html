<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>

body{
text-align:center;
font-family:Arial;
margin-top:120px;
background-image:url("bartaan.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
color:white;
overflow:hidden;
}

.buttons{
position:relative;
width:220px;
margin:auto;
margin-top:40px;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
position:absolute;
}

#no{
background:#28a745;
color:white;
left:90px;
top:0;
}

#yes{
background:#ff4d6d;
color:white;
left:0;
top:0;
}

.shake{
animation:shake 0.4s;
}

@keyframes shake{
0%{transform:translate(0,0)}
25%{transform:translate(-5px,5px)}
50%{transform:translate(5px,-5px)}
75%{transform:translate(-5px,-5px)}
100%{transform:translate(0,0)}
}

.emoji{
position:fixed;
top:-50px;
font-size:32px;
animation:fall linear;
}

@keyframes fall{
0%{transform:translateY(-50px);}
100%{transform:translateY(110vh);}
}

</style></head><body><h2>Mok ! Bhande ghasun zale ka 😉</h2><div class="buttons">
<button id="yes">Yes 😅</button>
<button id="no">No 😎</button>
</div><script>

const yes=document.getElementById("yes");
const no=document.getElementById("no");

let angle=0;

function moveYes(){

angle+=0.5;

let radius=70;

let x=Math.cos(angle)*radius;
let y=Math.sin(angle)*30;

yes.style.left=(x+70)+"px";
yes.style.top=(y)+"px";

}

yes.addEventListener("mouseover",moveYes);
yes.addEventListener("touchstart",moveYes);

no.onclick=function(){

if(navigator.vibrate){
navigator.vibrate([200,100,200,100,200]);
}

document.body.classList.add("shake");

setTimeout(()=>{
document.body.classList.remove("shake");
},500);

let emojis=["🍴","🍽️","🥄"];

for(let i=0;i<40;i++){

setTimeout(()=>{

let e=document.createElement("div");

e.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

e.className="emoji";

e.style.left=Math.random()*100+"vw";
e.style.animationDuration=(2+Math.random()*2)+"s";

document.body.appendChild(e);

setTimeout(()=>e.remove(),4000);

},i*60);

}

setTimeout(()=>{
alert("Kai help Karu tuzi 👀🫰🏻");
},1200);

}

</script></body>
</html>
